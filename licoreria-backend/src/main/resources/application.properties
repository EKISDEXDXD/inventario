spring.application.name=licoreria

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:licoreria_db}
spring.datasource.username=${POSTGRES_USER:licoreria_user}
spring.datasource.password=${POSTGRES_PASSWORD:licoreria_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=false

app.jwt.secret=esta-es-una-clave-secreta-mucho-mas-larga-y-segura-para-jwt-hs512-algoritmo-con-mas-de-64-bytes-para-licoreria-inventario-system-2026
app.jwt.expiration=86400000
server.port=8081

# CORS Configuration - separate by environment
app.cors.allowed-origins=http://localhost:4200,http://localhost:80,http://localhost,http://127.0.0.1,http://frontend,http://frontend:80

# Export configuration - uses system temp directory for reliable path handling
export.file.path=