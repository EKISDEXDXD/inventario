<div class="home-container" [class.close]="!(isMenuOpen$ | async)" [class.dark]="isDarkMode">

  <!-- Barra Lateral (Sidebar) -->
  <nav class="menu-main" [class.close]="!(isMenuOpen$ | async)" [class.open]="isMenuOpen$ | async">
    <div class="text-header-menu">
      <div class="logo-details">
        <div class="logo-box">BS</div>
        <div class="text-titles">
          <span class="name">BaseStock</span>
          <span class="profession">Inventory Software</span>
        </div>
      </div>
      <i class="bx bx-chevron-right toggle-btn" (click)="toggleMenu()"></i>
    </div>

    <!-- Contenedor de las opciones del menú lateral -->
    <div class="menu-site">
      <div class="menu">
        
        <!-- Lista de enlaces de navegación principal -->
        <ul class="menu-link">
          
          <!-- Opción: Inicio -->
          <li class="nav-link">
            <a routerLink="/" (click)="closeMenuOnMobile()">
              <i class="bx bx-home-alt"></i>
              <span class="text nav-text">Inicio</span>
            </a>
          </li>

          <!-- Sección: Inventarios -->
          <li class="menu-section-title">Inventarios</li>
          <li class="nav-link">
            <a routerLink="/my-stores" (click)="closeMenuOnMobile()">
              <i class="bx bx-store-alt"></i>
              <span class="text nav-text">Mis Tiendas</span>
            </a>
          </li>
          <li class="nav-link">
            <a routerLink="/create-store" (click)="closeMenuOnMobile()">
              <i class="bx bx-plus-circle"></i>
              <span class="text nav-text">Crear Tienda</span>
            </a>
          </li>

          <!-- Opción: Tiendas Externas -->
          <li class="nav-link">
            <a href="#" (click)="goToExternalStores(); closeMenuOnMobile()">
              <i class="bx bx-link-external"></i>
              <span class="text nav-text">Tiendas Externas</span>
            </a>
          </li>

        </ul>
      </div>
    </div>

    <!-- Sección inferior del menú (Logout y Dark Mode) -->
    <div class="bottom-content">
      <ul class="menu-link">
        
        <!-- Opción: Cerrar Sesión -->
        <li class="nav-link">
          <a (click)="logout()" style="cursor: pointer;">
            <i class="bx bx-log-out"></i>
            <span class="text nav-text">Cerrar Sesión</span>
          </a>
        </li>

        <!-- Opción: Control de Modo Oscuro -->
        <li class="mode" (click)="toggleDarkMode()" style="cursor: pointer;">
          <div class="sun-moon">
            <i class="bx bx-moon icon moon"></i>
            <i class="bx bx-sun icon sun"></i>
          </div>
          <span class="mode-text text">Modo Oscuro</span>

          <div class="toggle-switch">
            <span class="switch"></span>
          </div>
        </li>

      </ul>
    </div>
  </nav>

  <!-- Menu Overlay for Mobile -->
  <div class="menu-overlay" [class.open]="isMenuOpen$ | async" (click)="closeMenuOnMobile()"></div>

  <main class="main-content">
    <!-- router-outlet: Aquí se inyectan las diferentes páginas (home, my-stores, etc) -->
    <router-outlet></router-outlet>
  </main>

</div>
