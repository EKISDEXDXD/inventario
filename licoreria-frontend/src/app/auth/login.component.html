<div class="login-container">
  <div class="login-wrapper">
    <!-- Left Side - App Info -->
    <div class="login-info">
      <div class="app-header">
        <div class="app-icon"><i class="bx bx-bottle"></i></div>
        <h1 class="app-name">BaseStock</h1>
        <p class="app-tagline">Sistema de Gestión de Inventario</p>
      </div>

      <div class="info-cards">
        <div class="info-card">
          <div class="info-icon"><i class="bx bx-package"></i></div>
          <h3>Inventario</h3>
          <p>Controla tu stock con precisión</p>
        </div>
        <div class="info-card">
          <div class="info-icon"><i class="bx bx-trending-up"></i></div>
          <h3>Reportes</h3>
          <p>Análisis detallados de ventas</p>
        </div>
        <div class="info-card">
          <div class="info-icon"><i class="bx bx-store"></i></div>
          <h3>Tiendas</h3>
          <p>Gestiona múltiples ubicaciones</p>
        </div>
      </div>
    </div>

    <!-- Right Side - Login Form -->
    <div class="login-card">
      <div class="login-header">
        <h2>Iniciar Sesión</h2>
        <p>Accede a tu cuenta para continuar</p>
      </div>
      <form (ngSubmit)="login()">
        
        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Ingresa tu usuario" autocomplete="off" required />
        </div>
       
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Ingresa tu contraseña" autocomplete="new-password" required />
        </div>
        <button type="submit" class="login-btn">Entrar</button>
        <div *ngIf="error" class="error">{{ error }}</div>
      </form>
      <div class="divider">O</div>
      <button class="register-btn" (click)="goToRegister()"><i class="bx bx-user-plus"></i> Crear cuenta</button>
    </div>
  </div>
</div>
