<div class="stores-container">
  <header class="stores-header">
    <h1>Mis Tiendas</h1>
    <button class="back-btn" (click)="goBack()">← Volver</button>
  </header>

  <div class="stores-list">
    <div *ngIf="stores.length === 0" class="no-stores">
      <p>No tienes tiendas registradas aún.</p>
    </div>

    <div *ngFor="let store of stores" class="store-card" (click)="manageStore(store.id)">
      <h3>{{ store.name }}</h3>
      <p>{{ store.description }}</p>
      <p class="address">📍 {{ store.address }}</p>
      <span class="manager-badge">Encargado: {{ store.managerUsername }}</span>
      <div class="store-actions">
        <button class="manage-btn" (click)="$event.stopPropagation()">Gestionar Inventario →</button>
        <button class="delete-btn" (click)="$event.stopPropagation(); deleteStore(store.id)">🗑️ Eliminar Tienda</button>
      </div>
    </div>
  </div>
</div>
